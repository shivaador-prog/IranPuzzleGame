<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پازل افتخار ایران</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

<img id="board" src="images/01_board.png">
<img id="hero" src="images/02_ariobarzan.png">

<div id="heroName">آریوبرزن</div>

<audio id="heroVoice">
    <source src="audio/02_ariobarzan.mp3" type="audio/mpeg">
</audio>

<div id="progress">

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label0"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label1"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label2"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label3"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label4"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label5"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label6"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label7"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label8"></div>
</div>

<div class="progressItem">
<div class="cell"></div>
<div class="heroLabel" id="label9"></div>
</div>

</div>

<div id="questionBox">

<h2 id="question">
نام من چیست؟
</h2>

<button class="answer"></button>
<button class="answer"></button>
<button class="answer"></button>
<button class="answer"></button>

</div>

<audio id="correctSound">
<source src="audio/14_correct.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound">
<source src="audio/15_wrong.mp3" type="audio/mpeg">
</audio>

<audio id="bgMusic" loop>
<source src="audio/13_background.mp3" type="audio/mpeg">
</audio>

<audio id="narrator">
<source src="audio/01_narrator.mp3" type="audio/mpeg">
</audio>

<audio id="cheerSound">
<source src="audio/18_cheer.mp3" type="audio/mpeg">
</audio>

<audio id="nationalAnthem">
<source src="audio/12_national_anthem.mp3" type="audio/mpeg">
</audio>

<div id="startBox">

<input
id="playerName"
type="text"
placeholder="نام خود را وارد کنید">

<button id="startBtn">
شروع سفر
</button>

</div>
<div id="certificate"
style="display:none; position:absolute; inset:0; z-index:100; background:rgba(0,0,0,.45);">

    <img
        src="images/12_certificate.png"
        style="
        width:90%;
        max-width:900px;
        position:absolute;
        left:50%;
        top:50%;
        transform:translate(-50%,-50%);
        ">

    <div id="certName"
    style="
    position:absolute;
    left:50%;
    top:43%;
    transform:translateX(-50%);
    font-size:42px;
    font-weight:bold;
    color:#4a1f00;
    background:rgba(255,255,255,.95);
    padding:5px 70px;
    min-width:500px;
    border:3px solid #c89b3c;
    border-radius:15px;
    box-shadow:0 0 12px rgba(0,0,0,.25);
    text-align:center;
    font-family:'B Nazanin',Tahoma,sans-serif;">
    </div>

</div>

<div id="finalMessage"
style="
display:none;
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:80%;
text-align:center;
font-size:34px;
font-weight:bold;
color:white;
text-shadow:2px 2px 8px black;
font-family:'B Nazanin',Tahoma,sans-serif;">

🌹 تبریک قهرمان ایران 🌹<br>
تو نیز یکی از آینده‌سازان ایران عزیز هستی.<br>
با تلاش، دانش، مهربانی و ایمان، همیشه پرچم ایران را سرافراز نگه دار.<br><br>

<b>پایان</b>

</div>

<script src="script.js"></script>

</body>
</html>
